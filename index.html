<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ngân Hàng Đề Thi AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans p-6 min-h-screen relative">

    <div id="setupBox" class="max-w-4xl mx-auto bg-white p-8 rounded-lg shadow-md mb-8">
        <h1 class="text-3xl font-bold text-center text-blue-700 mb-6 border-b pb-4">Trình Tạo Đề Thi Tự Động</h1>
        
        <div class="mb-6 p-4 bg-yellow-50 border border-yellow-200 rounded-lg">
            <h2 class="font-bold text-yellow-800 mb-2">Bước 1: Copy Prompt chuẩn và dán vào AI (Kèm tài liệu của bạn)</h2>
            <div class="relative">
                <textarea id="promptTemplate" class="w-full h-32 p-3 text-sm bg-gray-50 border rounded font-mono" readonly>Đóng vai trò là chuyên gia ra đề. Đọc tài liệu tôi cung cấp và tạo ra [SỐ LƯỢNG] câu hỏi trắc nghiệm (4 đáp án, 1 đúng).
YÊU CẦU NGHIÊM NGẶT:
- Chỉ trả về ĐÚNG MỘT MẢNG JSON thuần túy (bắt đầu bằng [ và kết thúc bằng ]). Không giải thích thêm.
- Toán học: Bọc công thức trong $ $. Phải nhân đôi dấu gạch chéo (\), VD: \\frac{a}{b}, \\Delta.
- Tin học: Mã nguồn bọc trong thẻ <pre><code>...</code></pre>.
- Cấu trúc JSON bắt buộc của 1 câu:
[
  {
    "id": 1,
    "subject": "math", // hoặc "it"
    "question": "Nội dung",
    "options": {"A": "Đ/A 1", "B": "Đ/A 2", "C": "Đ/A 3", "D": "Đ/A 4"},
    "correctOption": "A",
    "explanation": "Lời giải chi tiết"
  }
]</textarea>
                <button onclick="copyPrompt()" class="absolute top-2 right-2 bg-blue-500 text-white px-3 py-1 text-xs rounded hover:bg-blue-600">Copy Prompt</button>
            </div>
        </div>

        <div class="mb-6">
            <h2 class="font-bold text-blue-800 mb-2">Bước 2: Dán kết quả AI (JSON) vào đây</h2>
            <textarea id="jsonInput" class="w-full h-48 p-3 border border-blue-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm" placeholder="Dán đoạn code JSON bắt đầu bằng [ và kết thúc bằng ] vào khu vực này..."></textarea>
        </div>

        <button onclick="startQuizFromInput()" class="w-full bg-green-600 text-white font-bold text-lg py-3 rounded-lg hover:bg-green-700 transition">Tạo Đề & Bắt Đầu Thi</button>
        <p id="errorMsg" class="text-red-500 font-semibold mt-3 hidden text-center"></p>
    </div>

    <div id="quizApp" class="hidden max-w-6xl mx-auto flex flex-col md:flex-row gap-6 mb-12">
        <div class="flex-1 bg-white p-8 rounded-lg shadow-md h-fit">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h2 class="text-2xl font-bold text-blue-600">Bài Thi Trắc Nghiệm</h2>
                <div>
                    <label class="font-semibold mr-2">Chế độ:</label>
                    <select id="modeSelect" class="border p-2 rounded outline-none focus:border-blue-500">
                        <option value="immediate">Luyện tập (Báo kết quả ngay)</option>
                        <option value="deferred">Kiểm tra (Làm xong mới báo)</option>
                    </select>
                </div>
            </div>
            <div id="quizContainer" class="space-y-8"></div>
        </div>

        <div class="w-full md:w-80 bg-white p-6 rounded-lg shadow-md h-fit sticky top-6">
            <div class="bg-red-500 text-white font-bold px-4 py-2 rounded-t-md flex items-center gap-2 mb-4">
                Điều hướng câu hỏi
            </div>
            <div id="navGrid" class="flex flex-wrap gap-2 max-h-60 overflow-y-auto custom-scrollbar mb-4"></div>
            <div id="statsBox" class="border-t pt-4 text-sm font-semibold space-y-2">
                <div class="flex justify-between"><span>Đã làm:</span> <span id="statAttempted" class="text-blue-600">0/0</span></div>
                <div class="flex justify-between"><span>Đúng:</span> <span id="statCorrect" class="text-green-600">0</span></div>
                <div class="flex justify-between"><span>Sai:</span> <span id="statWrong" class="text-red-600">0</span></div>
            </div>
            <button id="submitBtn" class="hidden w-full mt-6 bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 font-bold transition">Nộp Bài Kết Thúc</button>
        </div>
    </div>

    <div class="fixed bottom-2 right-4 text-gray-400 select-none z-50 italic text-[12px]">
        thực hiện bởi Toàn đầu tuổi 20
    </div>

    <script src="app.js"></script>
</body>
</html>
